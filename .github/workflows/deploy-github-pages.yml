name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so the workflow can push the docs/ update back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure game data exists
        run: |
          if [ ! -f public/manifest.json ]; then
            npm run convert:data
          fi

      - name: Build for GitHub Pages
        run: npm run build:gh-pages

      - name: Publish browser build into docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -a dist/modern-chummer-4/browser/. docs/
          cp docs/index.html docs/404.html
          touch docs/.nojekyll

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No docs/ changes to publish"
            exit 0
          fi
          git commit -m "Deploy site to docs/ [skip ci]"
          git push

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure game data exists
        run: |
          if [ ! -f public/manifest.json ]; then
            npm run convert:data
          fi

      - name: Build for GitHub Pages
        run: npm run build:gh-pages

      - name: Add SPA fallback (404.html)
        run: cp dist/modern-chummer-4/browser/index.html dist/modern-chummer-4/browser/404.html

      # Publish into /docs on main — matches Pages "Branch: main / Folder: /docs"
      - name: Deploy to docs/ on main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/modern-chummer-4/browser
          publish_branch: main
          destination_dir: docs
          commit_message: 'Deploy site to docs/ [skip ci]'
          # Never force_orphan on main — that would wipe the repo.
          force_orphan: false
